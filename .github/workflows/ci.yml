# Third-party actions are pinned to full commit SHAs (supply-chain hardening);
# the trailing comment records the human-readable version each SHA corresponds to.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt
      - uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0
      - name: Format check, compile, test (incl. RFC 6962 vectors)
        run: sbt -v "scalafmtCheckAll; compile; test"
