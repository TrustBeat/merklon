# NOTE: For production hardening, pin each action to a full commit SHA
# (e.g. actions/checkout@<sha> # v4.x.x) per supply-chain best practice.
# Version tags are used here for readability of the initial scaffold.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Format check, compile, test (incl. RFC 6962 vectors)
        run: sbt -v "scalafmtCheckAll; compile; test"
